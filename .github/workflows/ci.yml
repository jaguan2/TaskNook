name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  frontend:
    name: Frontend (test + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm test
      - run: npm run build

  backend:
    name: Backend (pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements-dev.txt
      - run: python -m pytest tests -q

  # Guards the schema promise: models and migrations must not drift apart.
  # Without this, a forgotten migration only surfaces as a broken upgrade on a
  # user's machine.
  migrations-in-sync:
    name: Migrations match models
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      - name: Fail if models have changes with no migration
        env:
          FLASK_APP: app.py
          TASKNOOK_DB: /tmp/ci-check.db
        run: |
          flask db upgrade
          flask db check

  # The one that matters most. `npm run build` and `import app` can both pass
  # while the packaged .exe is completely broken: backend/ ships as loose data,
  # so PyInstaller can't see its imports, and --windowed means a missing one
  # fails silently with no console. Only running the real artifact proves it.
  windows-exe:
    name: Windows .exe smoke test
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: npm ci
        working-directory: frontend
      - run: npm run build
        working-directory: frontend
      - run: pip install -r requirements-desktop.txt pyinstaller
      - name: Build TaskNook.exe
        run: >
          python -m PyInstaller --onefile --windowed --name TaskNook
          --distpath . --workpath build
          --add-data "backend/*.py;backend"
          --add-data "backend/migrations/*.py;backend/migrations"
          --add-data "backend/migrations/*.ini;backend/migrations"
          --add-data "backend/migrations/*.mako;backend/migrations"
          --add-data "backend/migrations/versions/*.py;backend/migrations/versions"
          --add-data "frontend/dist;frontend/dist"
          --hidden-import flask_cors
          --hidden-import flask_sqlalchemy
          --hidden-import flask_migrate
          --collect-all alembic
          --hidden-import logging.config
          --noconfirm
          desktop.py
      - name: Run the exe's self-test (boots server + migrations, no window)
        shell: pwsh
        env:
          TASKNOOK_SELFTEST: "1"
          PORT: "5099"
        run: |
          $p = Start-Process ".\TaskNook.exe" -PassThru
          if (-not $p.WaitForExit(180000)) {
            $p.Kill(); throw "TaskNook.exe hung (likely an error dialog)."
          }
          if ($p.ExitCode -ne 0) { throw "TaskNook.exe failed: exit $($p.ExitCode)" }
          Write-Host "exe self-test passed"
